<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/gift.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KIKI'S Return Gift Store – Curated return gifts for weddings, birthdays, pooja, and every celebration. Premium quality, affordable prices, delivered across India." />
    <meta name="theme-color" content="#247f98" />
    <title>KIKI'S Return Gift Store</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var cached = window.localStorage.getItem('kiki_active_theme');
          if (!cached) return;
          var theme = JSON.parse(cached);
          if (!theme || !theme.themeKey || !theme.colors) return;
          if (theme.themeKey === 'kiki-signature') return;
          var root = document.documentElement;
          root.setAttribute('data-theme-key', theme.themeKey);
          Object.keys(theme.colors).forEach(function (key) {
            var value = theme.colors[key];
            root.style.setProperty('--theme-' + key, value);
            if (typeof value !== 'string' || value.charAt(0) !== '#') return;
            var hex = value.slice(1);
            if (hex.length === 3) hex = hex.split('').map(function (char) { return char + char; }).join('');
            if (hex.length !== 6) return;
            var red = parseInt(hex.slice(0, 2), 16);
            var green = parseInt(hex.slice(2, 4), 16);
            var blue = parseInt(hex.slice(4, 6), 16);
            if ([red, green, blue].some(function (channel) { return Number.isNaN(channel); })) return;
            var rgb = red + ', ' + green + ', ' + blue;
            root.style.setProperty('--theme-' + key + '-rgb', rgb);
            [4, 8, 12, 16, 24, 32, 48, 64, 80].forEach(function (alpha) {
              root.style.setProperty('--theme-' + key + '-rgba-' + alpha, 'rgba(' + rgb + ', ' + (alpha / 100) + ')');
            });
          });
        } catch (error) {
          window.localStorage.removeItem('kiki_active_theme');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
